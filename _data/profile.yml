short_bio: >-
  <p>
    I am an interdisciplinary undergraduate researcher in Applied Mathematics at Guangzhou University, focusing on epigenetic mechanisms in plant metabolism, valorization of agricultural by-products, and adaptive machine learning under concept drift and extreme imbalance.
    My work integrates mathematical modeling, multi-omics analysis, and AI to advance sustainable bio-based materials and high-value utilization of medicinal plants (e.g., <i>Chrysanthemum morifolium</i> 'Fubaiju').
    <img src="assets/images/photos/research_interest.png" alt="Research Interests" 
         style="float: left; width: 350px; margin-right: 10px; border-radius: 8px;">
  </p>
  <p>
    I am currently a <strong>third-year undergraduate</strong> (大二下) in Applied Mathematics at 
    <a href="https://www.gzhu.edu.cn/" target="_blank">Guangzhou University</a>.
    My research is supervised by faculty in Life Sciences and related fields, with active collaborations on projects involving phenylpropanoid metabolism, DNA methylation, and biodegradable materials.
  </p>
  <p>
    Key highlights include:
    <ul>
      <li>Co-author of a <strong>SCI Q1 TOP</strong> paper in <i>Industrial Crops & Products</i> (2026) on Fubaiju by-product valorization (multi-omics to biodegradable films and biofertilizers).</li>
      <li><strong>PNAS</strong> and <strong>KDD</strong> manuscripts under review/submitted, covering epigenetic "Metabolic Partitioning Lock" and ACLEGR-TADD framework for fraud detection.</li>
      <li>Oral presentation at the 4th Peking University "Boya Caisi" International Doctoral Forum (2025) in the Advanced Carbon Materials session.</li>
      <li>Provincial funding: Guangdong "Climbing Plan" (攀登计划) project on epigenetic regulation for Fubaiju high-value utilization and bio-based materials (拟立项).</li>
    </ul>
  </p>
  <p>
    I am passionate about bridging applied mathematics with computational biology and sustainable materials. I am open to collaborations, research internships, or discussions on GeoAI/ML applications in agriculture and bioeconomy.
    If interested, please reach out via email or WeChat.
  </p>

